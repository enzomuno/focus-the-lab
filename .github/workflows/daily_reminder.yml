name: Envio de Lembrete Diário
on:
  schedule:
    # 20:00 no horário de Brasília (BRT) = 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Instalar bibliotecas
        run: npm install firebase-admin resend
        
      - name: Rodar script
        run: node scripts/send-emails.cjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
